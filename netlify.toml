# closermethod.com (apex) · proxy redirects to unify the tool ecosystem under one domain.
#
# Architecture decision (May 2026): all tools previously living on Netlify subdomains
# are now proxied through closermethod.com/[path]. SEO equity compounds onto the apex.
# Original subdomains still respond as fallbacks.
#
# All redirects below use status=200 force=true = TRUE PROXY (not 301).
# User sees closermethod.com/X · content served from origin Netlify site.

[build]
  publish = "."

# ─────── HEADERS · security + caching ───────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# ─────── TOOLS · the AI products ───────

# The Retainer Skill (free pitch generator) — canonical at /retainer
[[redirects]]
  from = "/retainer"
  to = "https://retainer-skill.netlify.app"
  status = 200
  force = true
[[redirects]]
  from = "/retainer/*"
  to = "https://retainer-skill.netlify.app/:splat"
  status = 200
  force = true

# /skill (singular) is FREED UP — no rule. Do not re-add. /skills (plural) below is AI Builder Toolkit.

