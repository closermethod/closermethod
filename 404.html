<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Page not found · Closer Method</title>
  <style>
    :root { --bg:#0A0A0B; --fg:#F5F5F5; --muted:#8A8A8F; --accent:#FF6B35; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body {
      background:var(--bg); color:var(--fg);
      font-family:"Geist","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:24px; line-height:1.5; text-align:center;
    }
    .wrap { max-width:440px; }
    .code { font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); font-weight:600; }
    h1 { font-size:clamp(28px,7vw,40px); font-weight:700; margin:14px 0 10px; letter-spacing:-.02em; }
    p { color:var(--muted); font-size:16px; margin-bottom:28px; }
    a.btn {
      display:inline-block; background:var(--accent); color:#0A0A0B;
      text-decoration:none; font-weight:600; font-size:15px;
      padding:13px 26px; border-radius:10px;
    }
    a.btn:hover { filter:brightness(1.08); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="code">404</div>
    <h1>This page moved or never existed</h1>
    <p>The link you followed isn't here. Head back to the front door and find what you came for.</p>
    <a class="btn" href="/build/">Go to closermethod.com</a>
  </main>
</body>
</html>
