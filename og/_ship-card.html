<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600;700&family=Geist+Mono:wght@500&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600;700&family=Geist+Mono:wght@500&display=swap" media="print" onload="this.media='all';this.onload=null">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600;700&family=Geist+Mono:wght@500&display=swap"></noscript>
<style>
html,body{margin:0;padding:0;width:1200px;height:630px;background:#0A0A0B;color:#FAFAFA;font-family:'Geist',system-ui,sans-serif;overflow:hidden}
.card{width:1200px;height:630px;padding:64px 72px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:space-between;background:radial-gradient(ellipse at top right,rgba(255,107,53,.18) 0%,transparent 60%),#0A0A0B;border:1px solid #27272A;position:relative}
.eyebrow{font-family:'Geist Mono',monospace;font-size:18px;text-transform:uppercase;letter-spacing:.16em;color:#FF6B35;margin:0}
.title{font-size:96px;line-height:.95;letter-spacing:-.035em;font-weight:600;margin:0;color:#FAFAFA;max-width:1040px}
.title i{font-style:normal;color:#FF6B35}
.sub{font-size:24px;line-height:1.35;color:#A1A1AA;max-width:920px;margin:0}
.foot{display:flex;justify-content:space-between;align-items:flex-end;font-family:'Geist Mono',monospace;font-size:18px;color:#71717A}
.foot .url{color:#FAFAFA}
.foot .price{color:#FF6B35;font-weight:500;font-size:22px}
.foot s{color:#71717A;margin-right:8px;text-decoration:line-through;font-weight:400}
.mark{position:absolute;top:64px;right:72px;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#C8421E);display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-weight:500;font-size:24px;color:#0A0A0B}
</style></head>
<body>
<div class="card">
  <div class="mark">EH</div>
  <div style="margin-top:24px">
    <p class="eyebrow">21 days to first paying client</p>
    <h1 class="title" style="margin:24px 0 0">ship your first paying client in <i>21 days</i>.</h1>
    <p class="sub" style="margin:24px 0 0">day 3 you ship the offer page. day 7 you send the cold dm. day 21 you close. one folder. one calendar.</p>
  </div>
  <div class="foot">
    <span class="url">closermethod.com/ship</span>
    <span class="price"><s>$13,400+ agency build</s>$147 once</span>
  </div>
</div>
</body></html>
